<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialFusion — Coming Soon</title>
  <meta name="description" content="SocialFusion brings your Mastodon and Bluesky timelines together in one beautiful iOS app. Coming Thursday.">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --mastodon: #563ACC;
      --bluesky: #0085FF;
      --accent-purple: #CC66FF;
      --bg: #09090B;
      --text: #FAFAFA;
      --text-muted: #A1A1AA;
      --border: #3F3F46;
      --gradient: linear-gradient(135deg, var(--mastodon), var(--bluesky));
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── ORB BACKGROUND ─── */
    .page {
      position: relative; width: 100%; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    /* Purple orb — left circle of venn */
    .page::before {
      content: ''; position: absolute;
      top: 48%; left: 38%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(140,80,230,0.35) 0%, rgba(86,58,204,0.20) 35%, rgba(86,58,204,0.05) 60%, transparent 75%);
      pointer-events: none; filter: blur(40px);
      animation: orbPurple 14s ease-in-out infinite;
    }
    /* Blue orb — right circle of venn */
    .page::after {
      content: ''; position: absolute;
      top: 48%; left: 62%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,160,255,0.32) 0%, rgba(0,133,255,0.18) 35%, rgba(0,133,255,0.04) 60%, transparent 75%);
      pointer-events: none; filter: blur(40px);
      mix-blend-mode: screen;
      animation: orbBlue 16s ease-in-out infinite;
    }
    @keyframes orbPurple {
      0% { transform: translate(-50%, -50%) scale(1); }
      15% { transform: translate(-42%, -51%) scale(1.06); }
      30% { transform: translate(-46%, -48%) scale(0.97); }
      50% { transform: translate(-40%, -50%) scale(1.08); }
      70% { transform: translate(-52%, -52%) scale(0.95); }
      85% { transform: translate(-48%, -49%) scale(1.03); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes orbBlue {
      0% { transform: translate(-50%, -50%) scale(1); }
      20% { transform: translate(-56%, -49%) scale(1.05); }
      40% { transform: translate(-52%, -51%) scale(0.96); }
      55% { transform: translate(-58%, -48%) scale(1.07); }
      75% { transform: translate(-46%, -50%) scale(0.98); }
      90% { transform: translate(-50%, -52%) scale(1.04); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    /* ─── CONTENT ─── */
    .content {
      position: relative; z-index: 1;
      text-align: center; padding: 40px 24px;
      max-width: 680px;
    }

    /* ─── BLURRED APP ICON ─── */
    .icon-glow {
      position: relative;
      width: 140px; height: 140px;
      margin: 0 auto 48px;
    }
    .icon-glow img {
      width: 140px; height: 140px; border-radius: 32px;
      position: relative; z-index: 1;
      opacity: 0.85;
    }
    .icon-glow::before {
      content: ''; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(86,58,204,0.5) 0%, rgba(0,133,255,0.3) 50%, transparent 80%);
      filter: blur(40px);
      animation: iconPulse 4s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }

    /* ─── LOGO TEXT ─── */
    .logo {
      font-size: 16px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      background: var(--gradient); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 24px;
    }

    /* ─── HEADLINE ─── */
    h1 {
      font-size: clamp(36px, 5vw, 60px); font-weight: 800;
      line-height: 1.05; letter-spacing: -2px; margin-bottom: 20px;
    }
    h1 .gradient {
      background: var(--gradient); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
    }

    .tagline {
      font-size: clamp(17px, 2vw, 20px); color: var(--text-muted);
      max-width: 480px; margin: 0 auto 48px; line-height: 1.7;
    }

    /* ─── COUNTDOWN ─── */
    .countdown {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 40px;
    }
    .countdown-units {
      display: flex; gap: 8px; align-items: flex-start;
    }
    .countdown-unit {
      text-align: center;
      min-width: 64px;
    }
    .countdown-value {
      font-size: 48px; font-weight: 800; line-height: 1;
      background: var(--gradient); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      font-variant-numeric: tabular-nums;
    }
    .countdown-unit-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-muted); margin-top: 8px;
    }
    .countdown-sep {
      font-size: 40px; font-weight: 300; color: var(--border);
      line-height: 1; padding-top: 2px;
    }

    /* ─── FOLLOW CTA ─── */
    .follow-section {
      margin-bottom: 40px;
    }
    .follow-label {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 14px;
    }
    .follow-buttons {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .follow-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px; font-size: 14px;
      font-weight: 600; text-decoration: none; transition: all 0.2s;
      border: 1px solid var(--border); color: var(--text);
      background: rgba(255,255,255,0.03);
    }
    .follow-btn:hover {
      background: rgba(255,255,255,0.08); transform: translateY(-1px);
    }
    .follow-btn.mastodon:hover { border-color: var(--mastodon); }
    .follow-btn.bluesky:hover { border-color: var(--bluesky); }

    /* ─── LINKS ─── */
    .links {
      display: flex; gap: 24px; justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--text-muted); text-decoration: none;
      font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .links a:hover { color: var(--text); }

    /* ─── BADGE ─── */
    .launched-badge {
      display: flex;
      margin: 0 auto 40px;
      padding: 10px 24px; border-radius: 100px;
      background: rgba(250, 204, 21, 0.1);
      border: 1px solid rgba(250, 204, 21, 0.25);
      color: #FACC15; font-size: 14px; font-weight: 600;
      letter-spacing: 0.5px; width: fit-content;
      align-items: center; gap: 8px;
    }
    .launched-badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #FACC15; animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
    }

    @media (max-width: 480px) {
      .countdown-value { font-size: 36px; }
      .countdown-unit { min-width: 48px; }
      .countdown-sep { font-size: 28px; }
      .icon-glow { width: 100px; height: 100px; margin-bottom: 36px; }
      .icon-glow img { width: 100px; height: 100px; border-radius: 24px; }
      .page::before {
        left: 32%; width: 400px; height: 400px; filter: blur(35px);
        animation: orbPurpleMobile 14s ease-in-out infinite;
      }
      .page::after {
        left: 68%; width: 400px; height: 400px; filter: blur(35px);
        animation: orbBlueMobile 16s ease-in-out infinite;
      }
    }
    @keyframes orbPurpleMobile {
      0% { transform: translate(-50%, -50%) scale(1); }
      15% { transform: translate(-40%, -51%) scale(1.08); }
      30% { transform: translate(-46%, -48%) scale(0.96); }
      50% { transform: translate(-38%, -50%) scale(1.10); }
      70% { transform: translate(-54%, -52%) scale(0.94); }
      85% { transform: translate(-48%, -49%) scale(1.04); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes orbBlueMobile {
      0% { transform: translate(-50%, -50%) scale(1); }
      20% { transform: translate(-58%, -49%) scale(1.06); }
      40% { transform: translate(-52%, -51%) scale(0.95); }
      55% { transform: translate(-60%, -48%) scale(1.09); }
      75% { transform: translate(-44%, -50%) scale(0.97); }
      90% { transform: translate(-50%, -52%) scale(1.05); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="content">
      <div class="icon-glow">
        <img src="appicon.png" alt="SocialFusion">
      </div>
      <div class="logo">SocialFusion</div>
      <h1>All your feeds.<br><span class="gradient">One timeline.</span></h1>
      <p class="tagline">The social web split up. Your timeline doesn't have to. Public beta Thursday, March 5.</p>

      <div class="launched-badge">
        <span class="dot"></span>
        Public Beta Opening Soon
      </div>

      <div id="countdown" class="countdown">
        <div class="countdown-units">
          <div class="countdown-unit"><div class="countdown-value" id="cd-days">--</div><div class="countdown-unit-label">Days</div></div>
          <span class="countdown-sep">:</span>
          <div class="countdown-unit"><div class="countdown-value" id="cd-hours">--</div><div class="countdown-unit-label">Hours</div></div>
          <span class="countdown-sep">:</span>
          <div class="countdown-unit"><div class="countdown-value" id="cd-mins">--</div><div class="countdown-unit-label">Min</div></div>
          <span class="countdown-sep">:</span>
          <div class="countdown-unit"><div class="countdown-value" id="cd-secs">--</div><div class="countdown-unit-label">Sec</div></div>
        </div>
      </div>

      <div class="follow-section">
        <div class="follow-label">Follow the launch on the networks that inspired the app</div>
        <div class="follow-buttons">
          <a href="https://ramblings.social/@frank" class="follow-btn mastodon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.33 19.55C21.7 17.17 21.97 12.62 21.97 12.62L22 12.49C22 6.29 18.13 4.76 18.13 4.76C16.17 3.84 12.09 3.67 12 3.67H11.97C11.88 3.67 7.8 3.84 5.87 4.76C5.87 4.76 2 6.29 2 12.49C2 12.49 1.97 17.49 2.67 19.55C3.67 22.53 8.39 23.21 9.47 23.24C9.47 23.24 10.65 23.27 11.4 22.64L11.17 21.17C11.17 21.17 9.43 21.67 8.03 21.34C6.63 21 6.23 20.06 6.17 19.83C6.17 19.83 6.13 19.65 6.17 19.55C6.17 19.55 8.17 20.1 10.5 20.3C12.13 20.43 13.63 20.2 13.83 20.17C15.97 19.83 17.83 18.49 18.07 17.27C18.43 15.37 18.33 12.62 18.33 12.62V12.49C18.33 10.34 17.37 9.27 17.37 9.27C17.37 9.27 16.4 8.24 14.4 8.17C12.97 8.13 12 8.77 12 8.77C12 8.77 11.03 8.13 9.6 8.17C7.6 8.24 6.63 9.27 6.63 9.27C6.63 9.27 5.67 10.34 5.67 12.49V12.62C5.67 12.62 5.57 14.73 5.77 16.23C5.9 17.23 6.23 17.83 6.23 17.83L6.17 19.83"/></svg>
            Mastodon
          </a>
          <a href="https://bsky.app/profile/frankramblings.com" class="follow-btn bluesky">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c-1 1-2 3-2 5 0 2 .5 3 1 4.5l-1 .5c-1.5.5-2.5 2-2.5 3.5 0 2 1.5 3.5 3.5 3.5 1 0 2-.5 2.5-1.5l.5 1.5c0 1 .5 1.5 1 1.5.5 0 1-.5 1-1.5l.5-1.5c.5 1 1.5 1.5 2.5 1.5 2 0 3.5-1.5 3.5-3.5 0-1.5-1-3-2.5-3.5l-1-.5c.5-1.5 1-2.5 1-4.5 0-2-1-4-2-5-1-1-2.5-1-3.5-1s-2.5 0-3.5 1z"/></svg>
            Bluesky
          </a>
        </div>
      </div>

      <div class="links">
        <a href="https://frankramblings.com">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          blog
        </a>
      </div>
    </div>
  </div>

<script>
(function() {
  var launch = new Date('2026-03-05T15:00:00Z').getTime();
  var days = document.getElementById('cd-days');
  var hours = document.getElementById('cd-hours');
  var mins = document.getElementById('cd-mins');
  var secs = document.getElementById('cd-secs');

  function pad(n) { return n < 10 ? '0' + n : n; }

  function tick() {
    var diff = launch - Date.now();
    if (diff <= 0) { days.textContent = '00'; hours.textContent = '00'; mins.textContent = '00'; secs.textContent = '00'; return; }
    days.textContent = pad(Math.floor(diff / 86400000));
    hours.textContent = pad(Math.floor((diff % 86400000) / 3600000));
    mins.textContent = pad(Math.floor((diff % 3600000) / 60000));
    secs.textContent = pad(Math.floor((diff % 60000) / 1000));
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
